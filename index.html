<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiz Permis D</title>
<style>
  :root{--bg:#0d1b2a;--card:#112236;--border:#1a3a5c;--green:#4ade80;--green-dim:#0a2318;--red:#f87171;--red-dim:#280d0d;--yellow:#fbbf24;--text:#e2eaf4;--muted:#4a6a88;--accent:#60a5fa;--input-bg:#0a1622;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:ui-monospace,'Courier New',Courier,monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
  .screen{display:none;width:100%;max-width:540px;}.screen.active{display:block;}
  .home-card{background:var(--card);border:2px solid var(--border);border-radius:18px;padding:36px 24px 32px;}
  .home-hero{text-align:center;margin-bottom:32px;}
  .home-hero .bus{font-size:52px;display:block;margin-bottom:8px;}
  .home-hero h1{font-size:26px;font-weight:700;color:var(--green);letter-spacing:4px;margin-bottom:6px;}
  .home-hero p{color:var(--muted);font-size:11px;letter-spacing:2px;}
  .field-label{color:var(--muted);font-size:11px;letter-spacing:1px;display:block;margin-bottom:10px;}
  .count-row{display:flex;gap:8px;margin-bottom:32px;}
  .count-btn{flex:1;padding:14px 0;background:var(--input-bg);color:var(--muted);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;transition:all .12s;}
  .count-btn.active{background:var(--accent);color:#0d1b2a;border-color:var(--accent);}
  .btn-start{width:100%;padding:16px;background:var(--green);color:#0d1b2a;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;letter-spacing:2px;}
  .btn-start:active{opacity:.8;}
  .quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .quiz-meta{color:var(--muted);font-size:11px;letter-spacing:1px;}
  .quiz-score{display:flex;gap:16px;}
  .score-ok{color:var(--green);font-size:12px;font-weight:700;}
  .score-ko{color:var(--red);font-size:12px;font-weight:700;}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:18px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease;width:0%;}
  .question-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:22px 20px;margin-bottom:14px;}
  .sign-box{display:none;justify-content:center;margin-bottom:16px;background:#f0ebe0;border-radius:10px;padding:14px;}
  .sign-box img{max-height:200px;max-width:100%;object-fit:contain;}
  .question-text{font-family:Georgia,'Times New Roman',serif;font-size:16px;line-height:1.75;color:var(--text);}
  .answer-input{width:100%;padding:13px 16px;background:var(--input-bg);color:var(--text);border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s,background .2s;}
  .answer-input:focus{border-color:var(--accent);}
  .answer-input.correct{border-color:var(--green);background:var(--green-dim);}
  .answer-input.wrong{border-color:var(--red);background:var(--red-dim);}
  .answer-input:disabled{opacity:.9;}
  .feedback{border-radius:10px;padding:14px 16px;margin-bottom:10px;display:none;}
  .feedback.correct{background:var(--green-dim);border:2px solid var(--green);display:block;}
  .feedback.wrong{background:var(--red-dim);border:2px solid var(--red);display:block;}
  .fb-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .fb-icon{font-size:18px;line-height:1;}
  .fb-title{font-size:13px;font-weight:700;}
  .feedback.correct .fb-title{color:var(--green);}
  .feedback.wrong .fb-title{color:var(--red);}
  .fb-body{font-size:12px;color:var(--text);line-height:1.55;}
  .btn-row{display:flex;gap:8px;margin-bottom:4px;}
  .btn{flex:1;padding:14px 10px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;}
  .btn:active{opacity:.75;}
  .btn-verify{background:var(--accent);color:#0d1b2a;flex:2;}
  .btn-skip{background:var(--input-bg);color:var(--muted);border:1px solid var(--border)!important;}
  .btn-ok{background:var(--green);color:#0d1b2a;}
  .btn-ko{background:var(--red-dim);color:var(--red);border:2px solid var(--red)!important;}
  .btn-menu{width:100%;padding:10px;background:transparent;color:var(--muted);border:none;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:1px;margin-top:4px;}
  .result-card{background:var(--card);border:2px solid var(--border);border-radius:18px;padding:36px 24px 28px;}
  .result-hero{text-align:center;margin-bottom:24px;}
  .result-emoji{font-size:52px;display:block;margin-bottom:4px;}
  .result-pct{font-size:58px;font-weight:700;line-height:1;margin-bottom:8px;}
  .result-pct.great{color:var(--green);}.result-pct.ok{color:var(--yellow);}.result-pct.bad{color:var(--red);}
  .result-sub{color:var(--muted);font-size:12px;letter-spacing:1px;}
  .errors-title{color:var(--muted);font-size:10px;letter-spacing:2px;margin-bottom:10px;}
  .errors-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
  .error-item{background:var(--red-dim);border:1px solid #3d1010;border-radius:8px;padding:12px 14px;}
  .error-q{color:#fca5a5;font-size:11px;line-height:1.6;margin-bottom:4px;}
  .error-user{color:var(--muted);font-size:11px;margin-bottom:4px;}
  .error-user em{color:#fca5a5;font-style:italic;}
  .error-ans{color:var(--green);font-size:12px;font-weight:700;}
  .result-btns{display:flex;gap:10px;}
  .btn-replay{flex:1;padding:13px;background:var(--accent);color:#0d1b2a;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}
  .btn-home-r{flex:1;padding:13px;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--border);}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}
</style>
</head>
<body>

<div id="screen-home" class="screen active">
  <div class="home-card">
    <div class="home-hero">
      <span class="bus">🚌</span>
      <h1>PERMIS D</h1>
      <p>200 QUESTIONS — 20 FICHES ÉCRITES</p>
    </div>
    <label class="field-label">NOMBRE DE QUESTIONS</label>
    <div class="count-row">
      <button class="count-btn" data-n="10">10</button>
      <button class="count-btn" data-n="50">50</button>
      <button class="count-btn" data-n="100">100</button>
      <button class="count-btn active" data-n="200">200</button>
    </div>
    <button class="btn-start" onclick="startQuiz()">DÉMARRER →</button>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <span class="quiz-meta" id="quiz-meta">Q1/200</span>
    <div class="quiz-score">
      <span class="score-ok" id="score-ok">✓ 0</span>
      <span class="score-ko" id="score-ko">✗ 0</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="question-card">
    <div class="sign-box" id="sign-box"><img id="sign-img" src="" alt="panneau"/></div>
    <p class="question-text" id="question-text"></p>
  </div>
  <input type="text" class="answer-input" id="answer-input"
    placeholder="Votre réponse… (Entrée pour valider)"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
    oninput="const b=document.getElementById('btn-verify');if(b)b.disabled=!this.value.trim();"
    onkeydown="handleKey(event)"/>
  <div class="feedback" id="feedback">
    <div class="fb-head"><span class="fb-icon" id="fb-icon"></span><span class="fb-title" id="fb-title"></span></div>
    <p class="fb-body" id="fb-body"></p>
  </div>
  <div class="btn-row" id="btn-row">
    <button class="btn btn-verify" id="btn-verify" onclick="verify()" disabled>VÉRIFIER</button>
    <button class="btn btn-skip" onclick="skip()">PASSER</button>
  </div>
  <button class="btn-menu" onclick="goHome()">← MENU</button>
</div>

<div id="screen-result" class="screen">
  <div class="result-card">
    <div class="result-hero">
      <span class="result-emoji" id="result-emoji">🎉</span>
      <div class="result-pct" id="result-pct">0%</div>
      <p class="result-sub" id="result-sub"></p>
    </div>
    <p class="errors-title" id="errors-label" style="display:none">À REVOIR :</p>
    <div class="errors-list" id="errors-list"></div>
    <div class="result-btns">
      <button class="btn-replay" onclick="startQuiz()">REJOUER</button>
      <button class="btn-home-r" onclick="goHome()">MENU</button>
    </div>
  </div>
</div>

// ── VÉRIFICATEUR ─────────────────────────────────────────────────────────
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\b(heures?|h)\b/g,"h").replace(/\b(minutes?|min)\b/g,"min").replace(/km\/h/g,"kmh").replace(/[^a-z0-9]/g," ").replace(/\s+/g," ").trim();}
const BOOL={oui:["o","yes","exact","si"],non:["n","no","faux","negatif"],vrai:["v","exact","oui","correct"],faux:["f","non","incorrect"]};
function lev(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:0));for(let j=1;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);return d[m][n];}
function checkAns(u0,c0){
  const u=norm(u0),c=norm(c0);
  if(u===c)return true;
  if(c.length>3&&u.includes(c))return true;
  if(u.length>3&&c.includes(u))return true;
  for(const[k,alts]of Object.entries(BOOL)){if(c===k&&(u===k||alts.includes(u)))return true;}
  const parts=c0.split(/[,\/\-–]/).map(p=>norm(p.trim())).filter(p=>p.length>1);
  if(parts.length>1&&parts.some(p=>u.includes(p)||p.includes(u)))return true;
  if(c.length<=14&&lev(u,c)<=2)return true;
  const keys=c.split(" ").filter(w=>w.length>3);
  if(keys.length>0&&keys.filter(w=>u.includes(w)).length>=Math.ceil(keys.length*.75))return true;
  return false;
}

// ── STATE ─────────────────────────────────────────────────────────────────
let pool=[],current=0,scoreOk=0,scoreKo=0,history=[],selectedCount=200,checked=false;

// ── INIT ──────────────────────────────────────────────────────────────────
document.querySelectorAll(".count-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".count-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    selectedCount=parseInt(btn.dataset.n);
  });
});

function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo(0,0);}
function goHome(){showScreen("screen-home");}

function startQuiz(){
  pool=[...Q].sort(()=>Math.random()-.5).slice(0,Math.min(selectedCount,Q.length));
  current=0;scoreOk=0;scoreKo=0;history=[];
  renderQuestion();showScreen("screen-quiz");
}

function renderQuestion(){
  checked=false;
  const q=pool[current];
  document.getElementById("quiz-meta").textContent=`F${q.f} · Q${current+1}/${pool.length}`;
  document.getElementById("score-ok").textContent=`✓ ${scoreOk}`;
  document.getElementById("score-ko").textContent=`✗ ${scoreKo}`;
  document.getElementById("progress-fill").style.width=`${current/pool.length*100}%`;
  document.getElementById("question-text").textContent=q.q;
  // Afficher le panneau si disponible
  const box=document.getElementById("sign-box"),img=document.getElementById("sign-img");
  if(q.s && SIGNS[q.s]){
    img.src=SIGNS[q.s];
    box.style.display="flex";
  } else {
    box.style.display="none";
    img.src="";
  }
  const inp=document.getElementById("answer-input");
  inp.value="";inp.className="answer-input";inp.disabled=false;
  document.getElementById("feedback").className="feedback";
  document.getElementById("btn-row").innerHTML=`<button class="btn btn-verify" id="btn-verify" onclick="verify()" disabled>VÉRIFIER</button><button class="btn btn-skip" onclick="skip()">PASSER</button>`;
  setTimeout(()=>inp.focus(),50);
}

function handleKey(e){if(e.key==="Enter"){if(!checked)verify();else advance();}}

function verify(){
  const inp=document.getElementById("answer-input");
  const val=inp.value.trim();if(!val)return;
  const q=pool[current];
  const ok=checkAns(val,q.r);
  checked=true;
  inp.className="answer-input "+(ok?"correct":"wrong");inp.disabled=true;
  const fb=document.getElementById("feedback");
  document.getElementById("fb-icon").textContent=ok?"✓":"✗";
  document.getElementById("fb-title").textContent=ok?"Correct !":"Incorrect";
  document.getElementById("fb-body").innerHTML=ok?"":`Réponse attendue : <strong>${q.r}</strong>`;
  fb.className="feedback "+(ok?"correct":"wrong");
  if(ok)scoreOk++;else scoreKo++;
  history.push({q,userAnswer:val,correct:ok});
  document.getElementById("btn-row").innerHTML=ok
    ?`<button class="btn btn-ok" onclick="advance()">SUIVANT →</button>`
    :`<button class="btn btn-ok" onclick="advance()">✓ Compris</button><button class="btn btn-ko" onclick="advance()">→ Suivant</button>`;
}

function skip(){history.push({q:pool[current],userAnswer:"",correct:false});scoreKo++;checked=true;advance();}

function advance(){
  if(current+1>=pool.length)showResult();
  else{current++;renderQuestion();}
}

function showResult(){
  const total=scoreOk+scoreKo,pct=total>0?Math.round(scoreOk/total*100):0;
  document.getElementById("result-emoji").textContent=pct>=75?"🎉":pct>=50?"💪":"📚";
  const el=document.getElementById("result-pct");
  el.textContent=pct+"%";el.className="result-pct "+(pct>=75?"great":pct>=50?"ok":"bad");
  document.getElementById("result-sub").textContent=`✓ ${scoreOk} CORRECT  ·  ✗ ${scoreKo} FAUX`;
  const errors=history.filter(h=>!h.correct);
  const lbl=document.getElementById("errors-label"),lst=document.getElementById("errors-list");
  if(errors.length===0){lbl.style.display="none";lst.innerHTML='<p style="color:var(--green);text-align:center;padding:12px;font-size:14px">✓ Toutes les réponses correctes !</p>';}
  else{lbl.style.display="block";lst.innerHTML=errors.map(h=>`<div class="error-item"><p class="error-q">${h.q.q}</p>${h.userAnswer?`<p class="error-user">Votre réponse : <em>${h.userAnswer}</em></p>`:""}<p class="error-ans">✓ ${h.q.r}</p></div>`).join("");}
  showScreen("screen-result");
}
</script>
